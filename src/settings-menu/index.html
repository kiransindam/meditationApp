<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings Menu Implementation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Main Content -->
    <main>
        <h1>Welcome to the Application</h1>
        <p>Click the gear icon below to open the settings menu.</p>
        <button id="openSettingsBtn" class="primary-btn">⚙️ Open Settings</button>
    </main>

    <!-- Settings Modal Overlay -->
    <div id="settingsModal" class="modal-overlay" aria-hidden="true">
        <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
            <div class="modal-header">
                <h2 id="settingsTitle">Settings</h2>
                <button id="closeSettingsBtn" class="close-btn" aria-label="Close settings">&times;</button>
            </div>
            
            <div class="modal-body">
                <!-- Theme Toggle -->
                <div class="setting-item">
                    <label for="themeToggle">Dark Mode</label>
                    <label class="switch">
                        <input type="checkbox" id="themeToggle">
                        <span class="slider round"></span>
                    </label>
                </div>

                <!-- Font Size Slider -->
                <div class="setting-item">
                    <label for="fontSizeSlider">Font Size: <span id="fontSizeValue">16</span>px</label>
                    <input type="range" id="fontSizeSlider" min="12" max="24" value="16" class="range-slider">
                </div>

                <!-- Notifications Toggle -->
                <div class="setting-item">
                    <label for="notifToggle">Enable Notifications</label>
                    <label class="switch">
                        <input type="checkbox" id="notifToggle" checked>
                        <span class="slider round"></span>
                    </label>
                </div>
            </div>

            <div class="modal-footer">
                <button id="resetSettingsBtn" class="secondary-btn">Reset to Default</button>
                <button id="saveSettingsBtn" class="primary-btn">Save & Close</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
